# StyleAI stack: Postgres + FastAPI backend + Vite frontend (nginx).
# Optional: set GOOGLE_API_KEY in .env for Gemini image generation.
# Backend uses Ollama on the HOST (not in Docker). Run on host: OLLAMA_HOST=0.0.0.0 ollama serve
# and pull models: ollama pull qwen2.5vl:3b && ollama pull qwen2.5:3b
# From repo root: docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: styleai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/styleai
      OLLAMA_HOST: http://ollama-stylist:11434 # to connect to external ollama, use http://host.docker.internal:11434
      HF_TOKEN: ${HF_TOKEN:-}
      VISION_MODEL: ${VISION_MODEL:-qwen2.5vl:3b}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:3b}
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_outputs:/app/outputs
      - ./backend/polyvore_converted.json:/app/polyvore_converted.json:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama
    container_name: ollama-stylist
    ports:
      - "11436:11434"
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=0        # CRITICAL: Unloads model from RAM immediately after chat
      - OLLAMA_MAX_LOADED_MODELS=1 # Prevents both Qwen models from being loaded at once
      - OLLAMA_NUM_PARALLEL=1      # Limits memory used for "thinking" buffers
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 16G

volumes:
  postgres_data:
  backend_uploads:
  backend_outputs:
