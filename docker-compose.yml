# StyleAI stack: Postgres + FastAPI backend + Vite frontend (nginx).
# Set GOOGLE_API_KEY in backend/.env for Gemini (text/vision + image generation).
# Backend uses Gemini API (see backend/.env for GOOGLE_API_KEY).
# From repo root: docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: styleai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/styleai
      HF_TOKEN: ${HF_TOKEN:-}
      VISION_MODEL: ${VISION_MODEL:-gemini-2.5-flash}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_outputs:/app/outputs
      - ./backend/polyvore_converted.json:/app/polyvore_converted.json:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
  backend_outputs:
