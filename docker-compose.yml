# StyleAI stack: Postgres + FastAPI backend + Vite frontend (nginx).
# Optional: set GOOGLE_API_KEY in .env for Gemini image generation.
# Backend uses Ollama on the HOST (not in Docker). Run on host: OLLAMA_HOST=0.0.0.0 ollama serve
# and pull models: ollama pull qwen2.5vl:3b && ollama pull qwen2.5:3b
# From repo root: docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: styleai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/styleai
      OLLAMA_HOST: http://host.docker.internal:11434
      HF_TOKEN: ${HF_TOKEN:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      VISION_MODEL: ${VISION_MODEL:-qwen2.5vl:3b}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:3b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8005:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
  backend_outputs:
